version: '3'

includes:
  backend:
    taskfile: ./backend/Taskfile.yaml
    dir: ./backend    # backendディレクトリ内で実行することを指定
    internal: false   # ルートから backend:test のように呼べるようにする

tasks:
  gen:backend:models:
    desc: "ドメインモデルを生成"
    cmds:
      - oapi-codegen -config backend/internal/domain/models/config.yaml api/openapi.yaml

  gen:backend:api:
    desc: "APIを生成"
    cmds:
      - oapi-codegen -config backend/internal/api/config.yaml api/openapi.yaml

  gen:bff:
    desc: "BFF用のデータを生成"
    cmds:
      - npx openapi-typescript api/openapi.yaml -o bff/src/types/api.d.ts

  generate:
    desc: "全てのコード生成を実行"
    cmds:
      - task: gen:backend:models
      - task: gen:backend:api
      - task: gen:bff

  test:all:
    desc: "バックエンドのテスト（マッピングチェックを含む）を実行"
    cmds:
      - task: backend:test
      # - task: bff:test

  gen-and-test:
    desc: "コード生成とテストを連続実行"
    cmds:
      - task: generate
      - task: test:all
  
  make:
    desc: "テストしてビルド"
    cmds:
      - task: backend:test
      # - task: bff:test
      - task: backend:build