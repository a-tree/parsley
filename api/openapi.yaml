openapi: 3.1.0
info:
  title: Parsley API
  description: ユーザー情報の登録・取得・変更・削除を行うためのCRUD API。
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: ローカル開発用APIサーバー (Go + Echo)

paths:
  /users:
    get:
      summary: 全ユーザーの取得
      operationId: listUsers
      responses:
        '200':
          description: ユーザー一覧の取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: 新規ユーザーの登録
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      responses:
        '201':
          description: ユーザーの作成完了
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: 特定ユーザーの取得
      operationId: getUserById
      responses:
        '200':
          description: ユーザー情報の取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: ユーザーが見つかりません

    put:
      summary: 登録内容の変更
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: ユーザーが見つかりません

    delete:
      summary: ユーザーの削除
      operationId: deleteUser
      responses:
        '204':
          description: 削除成功（レスポンスボディなし）

components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
          example: "パセリ太郎"
        email:
          type: string
          format: email
          example: "parsley@example.com"

    UserRegistration:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email