# parsley/backend/api/config.yaml

# 生成されるコードのパッケージ名
package: api

# 生成するコンテンツの指定
generate:
  echo-server: true   # Echoフレームワーク用のサーバーボイラープレートを生成
  embedded-spec: true # 生成されたコード内にOpenAPI定義を埋め込み、バリデーション等に利用可能にする

# 出力ファイルパス（Taskfileの実行場所からの相対パス、または絶対パス）
output: backend/internal/api/api.gen.go

# 外部パッケージのモデルをimportするための設定
# additional-imports:
#   - package: backend/internal/domain/models # プロジェクト名に合わせたパス
#     alias: . # ドットインポートすることで生成コード内の型参照を壊さないようにする

# オプション設定
output-options:
  skip-prune: true    # 未使用の定義も削除せずに生成する（開発初期に便利）